// ─── SCENE SETUP ─────────────────────────────────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0, 3.5);

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('three-canvas'),
    antialias: true,
    alpha: false
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000005, 1);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const sv = [];
  for (let i = 0; i < 6000; i++) {
    const r = 300 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    sv.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.4,sizeAttenuation:true})));

  // Lights
  scene.add(new THREE.AmbientLight(0x111133, 0.4));
  const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
  sun.position.set(6,2,4);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x001133, 0.15);
  fill.position.set(-5,-1,-3);
  scene.add(fill);

  earthGroup = new THREE.Group();
  scene.add(earthGroup);

  const texLoader = new THREE.TextureLoader();
  texLoader.crossOrigin = 'anonymous';

  // Texture da repository GitHub raw — stesse origin, nessun problema CORS
  const colorTex = texLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg');
  const bumpTex  = texLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/elev_bump_4k.jpg');
  const specTex  = texLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/water_4k.png');
  const nightTex = texLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png');

  earthMesh = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_RADIUS, 96, 96),
    new THREE.MeshPhongMaterial({
      map: colorTex, bumpMap: bumpTex, bumpScale: 0.015,
      specularMap: specTex, specular: new THREE.Color(0x4499cc), shininess: 60,
      emissiveMap: nightTex, emissive: new THREE.Color(0xffd090), emissiveIntensity: 0.08
    })
  );
  earthGroup.add(earthMesh);

  const cloudsTex = texLoader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png');
  const cloudsMesh = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_RADIUS*1.008, 64, 64),
    new THREE.MeshPhongMaterial({map:cloudsTex, transparent:true, opacity:0.38, depthWrite:false})
  );
  earthGroup.add(cloudsMesh);
  window._cloudsMesh = cloudsMesh;

  earthGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_RADIUS*1.055, 48, 48),
    new THREE.MeshPhongMaterial({color:0x2255ff, transparent:true, opacity:0.13, side:THREE.BackSide})
  ));

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  setupMouseControls();
  window.addEventListener('wheel', e => {
    camera.position.z += e.deltaY * 0.002;
    camera.position.z = Math.max(1.5, Math.min(8, camera.position.z));
  });
}

function setupMouseControls() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', e => { isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
  window.addEventListener('mouseup', () => isDragging=false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    targetRotY += (e.clientX-prevMouse.x)*0.005;
    targetRotX += (e.clientY-prevMouse.y)*0.005;
    targetRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetRotX));
    prevMouse={x:e.clientX,y:e.clientY};
  });
  el.addEventListener('touchstart', e=>{ isDragging=true; prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
  window.addEventListener('touchend', ()=>isDragging=false);
  window.addEventListener('touchmove', e=>{
    if (!isDragging||!e.touches[0]) return;
    targetRotY+=(e.touches[0].clientX-prevMouse.x)*0.005;
    targetRotX+=(e.touches[0].clientY-prevMouse.y)*0.005;
    targetRotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,targetRotX));
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  });
}

// ─── TLE ─────────────────────────────────────────────────────────────────────
function parseTLE(text) {
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const result = [];
  for (let i=0; i<lines.length-2; i++) {
    if (!lines[i+1].startsWith('1 ')||!lines[i+2].startsWith('2 ')) continue;
    const name = lines[i].replace(/^0 /,'').trim();
    try {
      const satrec = satellite.twoline2satrec(lines[i+1], lines[i+2]);
      if (satrec && satrec.error===0) { result.push({name,satrec}); i+=2; }
    } catch(e){}
  }
  return result;
}

function eciToThree(pos) {
  const s = 1/6371;
  return new THREE.Vector3(pos.x*s, pos.z*s, -pos.y*s);
}

function createSatMesh(name) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(
    new THREE.PlaneGeometry(0.018, 0.018),
    new THREE.MeshBasicMaterial({color:0x00ff88, side:THREE.DoubleSide, transparent:true, opacity:0.9})
  ));
  const lc = document.createElement('canvas');
  lc.width=256; lc.height=48;
  const lx=lc.getContext('2d');
  lx.font='bold 22px monospace'; lx.fillStyle='#00ff88';
  lx.fillText(name.substring(0,18),4,32);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true,opacity:0.75}));
  sp.scale.set(0.18,0.034,1); sp.position.set(0.1,0.01,0);
  g.add(sp);
  return g;
}

function buildSatellites(tleData) {
  satellites.forEach(s=>earthGroup.remove(s.group));
  satellites=[];
  const now=new Date();
  tleData.slice(0,MAX_SATS).forEach(({name,satrec})=>{
    try {
      const pv=satellite.propagate(satrec,now);
      if (!pv||!pv.position||typeof pv.position.x!=='number') return;
      const group=createSatMesh(name);
      group.position.copy(eciToThree(pv.position));
      earthGroup.add(group);
      satellites.push({satrec,group});
    } catch(e){}
  });
  document.getElementById('s-count').textContent=satellites.length;
}

let lastSatUpdate=0;
function updateSatPositions(now) {
  satellites.forEach(s=>{
    try {
      const pv=satellite.propagate(s.satrec,now);
      if (!pv||!pv.position||typeof pv.position.x!=='number') return;
      s.group.position.copy(eciToThree(pv.position));
      s.group.quaternion.copy(camera.quaternion);
    } catch(e){}
  });
}

// ─── FINGER CANVAS ──────────────────────────────────────────────────────────
const fingerCvs=document.getElementById('finger-canvas');
fingerCvs.width=window.innerWidth; fingerCvs.height=window.innerHeight;
const fctx=fingerCvs.getContext('2d');
window.addEventListener('resize',()=>{ fingerCvs.width=window.innerWidth; fingerCvs.height=window.innerHeight; });

function drawFingerDots(lm) {
  fctx.clearRect(0,0,fingerCvs.width,fingerCvs.height);
  if (!lm) return;
  [4,8,12,16,20].forEach(idx=>{
    const x=(1-lm[idx].x)*fingerCvs.width, y=lm[idx].y*fingerCvs.height;
    fctx.beginPath(); fctx.arc(x,y,8,0,Math.PI*2);
    fctx.fillStyle='#ffffff'; fctx.shadowBlur=15; fctx.shadowColor='#ffffff';
    fctx.fill(); fctx.shadowBlur=0;
  });
}

// ─── HAND TRACKING ──────────────────────────────────────────────────────────

  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
    const video=document.getElementById('webcam-video');
    video.srcObject=stream;
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    hands.onResults(results=>{
      if (results.multiHandLandmarks&&results.multiHandLandmarks.length>0) {
        const lm=results.multiHandLandmarks[0];
        drawFingerDots(lm);
        const palm=lm[9];
        const px=1-palm.x, py=palm.y;
        if (prevPalmX!==null) {
          const spread=Math.hypot(lm[4].x-lm[20].x, lm[4].y-lm[20].y);
          if (spread>0.15) {
            targetRotY+=(px-prevPalmX)*4;
            targetRotX+=(py-prevPalmY)*4;
            targetRotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,targetRotX));
            document.getElementById('s-hand').textContent='OPEN — TRACKING';
          } else { document.getElementById('s-hand').textContent='CLOSED'; }
        }
        prevPalmX=px; prevPalmY=py;
      } else {
        drawFingerDots(null); prevPalmX=null; prevPalmY=null;
        document.getElementById('s-hand').textContent='NOT DETECTED';
      }
    });
    const mpCam=new Camera(video,{onFrame:async()=>{ await hands.send({image:video}); },width:640,height:480});
    mpCam.start();
  } catch(e) {
    document.getElementById('s-hand').textContent='CAM N/A';
    document.getElementById('cam-panel').style.display='none';
  }
}

// ─── FETCH TLE CON FALLBACK ──────────────────────────────────────────────────
async function fetchTLEWithFallback() {
  // Tenta ogni proxy uno alla volta con timeout
  for (let i=0; i<PROXY_LIST.length; i++) {
    const url=PROXY_LIST[i];
    setProgress(20+i*8, `TRYING PROXY ${i+1}/${PROXY_LIST.length}...`);
    try {
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(), 8000); // 8s timeout per proxy
      const resp=await fetch(url, {signal:controller.signal, cache:'no-store'});
      clearTimeout(timeout);
      if (!resp.ok) continue;
      const text=await resp.text();
      if (text.length>500 && text.includes('1 ') && text.includes('2 ')) {
        document.getElementById('s-src').textContent='LIVE — CELESTRAK';
        return text;
      }
    } catch(e) { /* continua al prossimo */ }
  }
  // Tutti i proxy hanno fallito — usa dati statici
  document.getElementById('s-src').textContent='STATIC — DEMO';
  console.warn('All CORS proxies failed, using static TLE data');
  return STATIC_TLE;
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const now=new Date();
  currentRotX+=(targetRotX-currentRotX)*0.08;
  currentRotY+=(targetRotY-currentRotY)*0.08;
  earthGroup.rotation.x=currentRotX;
  earthGroup.rotation.y=currentRotY;
  if (window._cloudsMesh) window._cloudsMesh.rotation.y+=0.00008;
  const ts=now.getTime();
  if (ts-lastSatUpdate>2000) { updateSatPositions(now); lastSatUpdate=ts; }
  document.getElementById('s-time').textContent=now.toUTCString().slice(17,25);
  renderer.render(scene,camera);
}

// ─── MAIN ────────────────────────────────────────────────────────────────────
(async()=>{
  try {
    setProgress(5,'INITIALIZING 3D ENGINE...');
    initScene();

    setProgress(15,'FETCHING SATELLITE DATA...');
    const tleText=await fetchTLEWithFallback();

    setProgress(65,'PARSING TLE DATA...');
    const tleData=parseTLE(tleText);

    setProgress(80,`BUILDING ${tleData.length} SATELLITE OBJECTS...`);
    buildSatellites(tleData);

    setProgress(90,'STARTING HAND TRACKING...');
    initHandTracking();

    setProgress(100,'READY');
    await new Promise(r=>setTimeout(r,600));
    const loadEl=document.getElementById('loading');
    loadEl.style.opacity='0';
    setTimeout(()=>loadEl.style.display='none',800);
    animate();
  } catch(err) {
    document.getElementById('loading-msg').textContent='ERROR: '+err.message;
    document.getElementById('loading-bar').style.background='#ff4466';
  }
})();
</script>
